name: Build

permissions:
  contents: read

on:
  push:
    branches:
      - '**' # All branches; tag pushes are handled by release.yml.
  pull_request:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false -Dorg.gradle.internal.launcher.welcomeMessageEnabled=false"

concurrency:
  group: build-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest # jvm + interop (KSP/metadata) + linuxX64/linuxArm64 + js + wasmJs
            task: build
          - os: macos-latest # macosArm64
            task: ':kavi-kt:check'
          - os: windows-latest # mingwX64
            task: ':kavi-kt:check'

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v5.0.0

      - name: Set up JDK
        uses: actions/setup-java@v5.0.0
        with:
          distribution: 'zulu'
          java-version-file: .github/workflows/.java-version

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5.0.0

      - name: Cache Kotlin/Native (konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Build
        run: ./gradlew ${{ matrix.task }}
